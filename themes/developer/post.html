<!doctype html>
<html>
    <head>
        <title>{{title}} - {{name}}</title>
        {{>meta.html}}
        <style type="text/css">
            {{>post.css}}
        </style>
    </head>
    <body>
        <div class="floating">
            <ul>
                <li>
                    <div onclick="window.scrollTo(0, 0);">
                        <svg
                            width="50px"
                            height="50px"
                            viewBox="0 0 24 24"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                d="M12.707 5.293a1 1 0 0 0-1.414 0l-4 4a1 1 0 0 0 1.414 1.414L11 8.414V18a1 1 0 1 0 2 0V8.414l2.293 2.293a1 1 0 0 0 1.414-1.414l-4-4Z"
                                fill="#000000"
                            ></path>
                        </svg>
                    </div>
                </li>
            </ul>
        </div>
        <div class="post">
            <div class="header">
                <a class="image" href="{{{root}}}"
                    ><img class="portrait" src="{{{root}}}portrait.jpg"
                /></a>
                <a class="author" href="{{{root}}}">{{author}}</a
                ><span class="date">{{date}}</span>
            </div>
            <article class="article">
                <h1>{{title}}</h1>
                <div class="content">{{{content}}}</div>
            </article>
        </div>
    </body>
</html>
